<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 AI 助手</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 2048 AI 助手</h1>
            <p class="subtitle">设置棋盘 → AI 帮你走出最优解</p>
        </header>

        <div class="controls">
            <div class="mode-switch">
                <button id="manualMode" class="btn active">手动模式</button>
                <button id="aiMode" class="btn">AI 模式</button>
            </div>
            <div class="actions">
                <button id="resetBtn" class="btn btn-secondary">重置棋盘</button>
                <button id="aiStepBtn" class="btn btn-primary">AI 走一步</button>
                <button id="autoPlayBtn" class="btn btn-success">自动运行</button>
            </div>
        </div>

        <div class="game-area">
            <div class="grid-container">
                <div class="grid" id="grid">
                    <!-- 16 cells generated by JS -->
                </div>
            </div>

            <div class="info-panel">
                <div class="score-box">
                    <h3>当前分数</h3>
                    <div id="score" class="score">0</div>
                </div>
                <div class="ai-suggestion">
                    <h3>AI 建议</h3>
                    <div id="suggestion" class="suggestion">点击 "AI 走一步"</div>
                    <div id="suggestionScore" class="suggestion-score"></div>
                </div>
                <div class="direction-hint">
                    <h3>方向控制</h3>
                    <div class="arrow" id="arrowUp">↑</div>
                    <div class="arrow-row">
                        <div class="arrow" id="arrowLeft">←</div>
                        <div class="arrow" id="arrowDown">↓</div>
                        <div class="arrow" id="arrowRight">→</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="instructions">
            <h3>📖 使用说明</h3>
            <ol>
                <li><strong>设置棋盘：</strong>点击任意格子左侧 -1，右侧 +1，设置成和你的 2048 游戏一样的局面</li>
                <li><strong>AI 走一步：</strong>点击按钮让 AI 帮你选择最优移动方向（不自动添加新数字）</li>
                <li><strong>自动运行：</strong>AI 自动持续走步（需要手动添加新数字）</li>
                <li><strong>方向控制：</strong>手动模式下，可用键盘方向键或点击方向箭头</li>
            </ol>
            <p class="tip">💡 提示：AI 会尽量活得久，不一定每步都追求最大合成</p>
        </div>

        <footer>
            <p>Made with 🌸 by 明妃 | 纯前端实现，无需后端</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
